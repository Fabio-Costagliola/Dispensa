<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dispensa</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.png" />

  <!-- Theme color -->
  <meta name="theme-color" content="#0a7d00" />
</head>

<body class="bg-gray-100 min-h-screen flex justify-center px-4 pt-6">
  <!-- WRAPPER: limita la larghezza come un’app iPhone -->
  <div class="w-full max-w-[420px]">

    <!-- Header -->


<header class="mb-6">
  <div class="flex items-center gap-2">
    <img src="icon.png" alt="Dispensa" class="w-[30px] h-[30px] rounded-sm" />
    <h1 class="text-2xl sm:text-3xl font-bold text-green-700 leading-none">Dispensa</h1>
    <span id="app-version" class="ml-auto text-xs text-gray-500" aria-label="Versione software"></span>
  </div>
</header>



    <!-- Scanner -->
<!-- Scanner: modalità fotocamera nativa a tutto schermo -->
<section class="bg-white shadow-md rounded-xl p-4 mb-6">
  <h2 class="text-lg font-semibold mb-3">Scansiona un prodotto</h2>

  <!-- Il riquadro rimane solo come placeholder/overlay (non streaming) -->
  <div id="reader"
       class="mx-auto rounded-lg overflow-hidden border border-gray-300 w-[240px] h-[80px] flex items-center justify-center text-gray-400 text-sm">
    Fotocamera a schermo intero (foto)
  </div>

  <p id="scan-result" class="mt-2 text-green-700 font-medium text-center"></p>

  <!-- Input "nascosto" che apre la fotocamera nativa -->
  <input id="capture"
         type="file"
         accept="image/*"
         capture="environment"
         class="hidden" />

  <div class="mt-3 grid grid-cols-1 gap-2">
    <!-- Questo bottone apre la fotocamera a schermo intero -->
    <label for="capture"
           class="cursor-pointer text-center bg-green-600 text-white py-2 rounded-lg shadow hover:bg-green-700">
      Scatta e leggi
    </label>
  </div>

  <!-- (Opzionale) link per tornare alla modalità “telecamera live” -->
  <!--
  <div class="mt-2 text-center">
    <button onclick="startScannerLive()" class="text-xs text-blue-600 underline">
      Usa modalità telecamera (stream)
    </button>
  </div>
  -->
</section>

    <!-- Form Prodotto -->
    <section class="bg-white shadow-md rounded-xl p-4">
      <h2 class="text-lg font-semibold mb-3">Dettagli prodotto</h2>

      <div class="space-y-3">
        <input id="barcode"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg bg-gray-100"
               placeholder="Codice scansionato" readonly />

        <input id="description"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Descrizione prodotto" />

        <input id="location"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Posizione (es. Frigo, Dispensa)" />

        <input id="quantity" type="number"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Quantità" />

        <input id="expiry" type="date"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg" />
      </div>

      <div class="grid grid-cols-3 gap-2 mt-4">
        <button onclick="saveProduct()"
                class="bg-green-600 text-white py-2 rounded-lg shadow hover:bg-green-700">
          Salva
        </button>
        <button onclick="loadProduct()"
                class="bg-blue-600 text-white py-2 rounded-lg shadow hover:bg-blue-700">
          Cerca
        </button>
        <button onclick="updateProduct()"
                class="bg-yellow-500 text-white py-2 rounded-lg shadow hover:bg-yellow-600">
          Modifica
        </button>
      </div>
    </section>

    <!-- Spazio inferiore per iPhone con notch / safe area -->
    <div class="h-6"></div>
  </div>

  <!-- Libreria scanner (funziona su iPhone/Safari) -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- App logic (ES module) -->
  <script type="module" src="app.js"></script>

  <!-- Script scanner locale (manteniamo qui per semplicità) -->
<script>
  // === Modalità "foto a schermo intero" ===
  // 1) Usa BarcodeDetector (se disponibile in Safari/iOS recenti)
  // 2) Fallback su html5-qrcode.scanFileV2

  const fileInput = document.getElementById('capture');
  const resultEl  = document.getElementById('scan-result');

  // Formati da cercare (BarcodeDetector)
  const BARCODE_FORMATS = ['ean_13', 'ean_8', 'code_128', 'upc_a', 'upc_e'];

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    try {
      // 1) Prova con BarcodeDetector (se supportato)
      const code = await tryBarcodeDetector(file);
      if (code) {
        handleDecodedText(code);
        return;
      }

      // 2) Fallback: html5-qrcode (scanFileV2)
      const code2 = await tryHtml5QrcodeScan(file);
      if (code2) {
        handleDecodedText(code2);
        return;
      }

      // Nessun match
      resultEl.textContent = 'Nessun codice rilevato. Riprova avvicinando e curando la luce.';
      resultEl.classList.remove('text-green-700');
      resultEl.classList.add('text-red-600');
    } catch (err) {
      console.error(err);
      resultEl.textContent = 'Errore durante la lettura. Riprova.';
      resultEl.classList.remove('text-green-700');
      resultEl.classList.add('text-red-600');
    } finally {
      // Permette nuovi scatti consecutivi
      fileInput.value = '';
    }
  });

  async function tryBarcodeDetector(file) {
    if (!('BarcodeDetector' in window)) return null;

    try {
      const detector = new BarcodeDetector({ formats: BARCODE_FORMATS });
      const bitmap = await createImageBitmap(file);
      const codes = await detector.detect(bitmap);
      if (codes && codes.length) {
        // Prendi il migliore (il più lungo o il primo)
        const best = codes.sort((a, b) => (b.rawValue?.length || 0) - (a.rawValue?.length || 0))[0];
        return best.rawValue || null;
      }
      return null;
    } catch (e) {
      // Alcuni device dichiarano l’API ma falliscono → passa al fallback
      return null;
    }
  }

  async function tryHtml5QrcodeScan(file) {
    if (typeof Html5Qrcode === 'undefined') return null;
    const formats = [
      // Questi nomi sono quelli di html5-qrcode
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E
    ];
    // Istanzia con l’ID del container (non visualizza stream in questa modalità)
    const html5 = new Html5Qrcode('reader', { formatsToSupport: formats });

    try {
      // scanFileV2 restituisce un oggetto con .decodedText (o array, a seconda versione)
      const res = await html5.scanFileV2(file, /* showImage */ false);
      // Alcune versioni ritornano { decodedText, result }
      if (res?.decodedText) return res.decodedText;

      // In altre, res può essere un array (prendi il migliore/il primo)
      if (Array.isArray(res) && res.length) {
        return res[0]?.decodedText || null;
      }
      return null;
    } finally {
      try { await html5.clear(); } catch(_) {}
    }
  }

  function handleDecodedText(decodedText) {
    document.getElementById('barcode').value = decodedText;
    resultEl.textContent = 'Scansionato: ' + decodedText;
    resultEl.classList.remove('text-red-600');
    resultEl.classList.add('text-green-700');
  }

  // === (Opzionale) Modalità live di prima ===
  // Se vuoi tenere anche il vecchio streaming, puoi ripristinarlo qui:
  async function startScannerLive() {
    try {
      const formats = [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E
      ];
      const config = { fps: 12, qrbox: 220, aspectRatio: 1.0, disableFlip: true, formatsToSupport: formats };
      if (!window.__qrLive) window.__qrLive = new Html5Qrcode('reader');
      await window.__qrLive.start({ facingMode: 'environment' }, config, (text) => handleDecodedText(text));
    } catch (e) {
      console.error(e);
      alert('Impossibile avviare lo streaming. Resta quella a foto.');
    }
  }
  async function stopScannerLive() {
    if (window.__qrLive) {
      try { await window.__qrLive.stop(); await window.__qrLive.clear(); } catch(_) {}
      window.__qrLive = null;
    }
  }
</script>
 <script>
  async function setHeaderVersionFromSW() {
    // Se il browser non supporta i SW, esci
    if (!('serviceWorker' in navigator)) return;

    try {
      // Attendi che il SW sia pronto/attivo
      const reg = await navigator.serviceWorker.ready;

      // Prepara un canale per ricevere la risposta
      const channel = new MessageChannel();
      const versionPromise = new Promise((resolve) => {
        channel.port1.onmessage = (e) => resolve(e?.data?.version || null);
        // fallback nel caso non arrivasse risposta
        setTimeout(() => resolve(null), 2500);
      });

      // Invia la richiesta al SW “controllore” (quello attivo sulla pagina)
      const target = navigator.serviceWorker.controller || reg.active;
      if (target) {
        target.postMessage({ type: 'GET_VERSION' }, [channel.port2]);
      }

      // Aggiorna lo span se ricevi la versione
      const v = await versionPromise;
      const el = document.getElementById('app-version');
      if (el && v) {
        el.textContent = `v${v}`;
      } else if (el) {
        // opzionale: se nessuna versione è disponibile
        el.textContent = '';
      }
    } catch (err) {
      // In caso di errori, lascia vuoto lo span
      console.warn('Version fetch failed', err);
    }
  }

  // Leggi la versione quando la pagina è caricata
  window.addEventListener('load', () => {
    // Piccolo delay per dare tempo al SW di attivarsi
    setTimeout(setHeaderVersionFromSW, 200);
  });

  // Se il SW cambia (dopo un aggiornamento), rileggi la versione
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      setTimeout(setHeaderVersionFromSW, 200);
    });
  }
</script>
</body>
</html>
