<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dispensa</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.png" />

  <!-- Theme color -->
  <meta name="theme-color" content="#0a7d00" />
</head>

<body class="bg-gray-100 min-h-screen flex justify-center px-4 pt-6">
  <!-- WRAPPER: limita la larghezza come un’app iPhone -->
  <div class="w-full max-w-[420px]">

    <!-- Header -->

<header class="mb-6">
  <div class="flex items-center gap-2">
    <img src="icon.png" alt="Dispensa"
         class="w-[10px] h-[10px] inline-block rounded-sm select-none pointer-events-none" />
    <h1 class="text-2xl sm:text-3xl font-bold text-green-700 leading-none">Dispensa</h1>
    <span id="app-version"
          class="ml-auto text-xs text-gray-500 tracking-tight"
          aria-label="Versione software">v…</span>
  </div>
</header>


    <!-- Scanner -->
    <section class="bg-white shadow-md rounded-xl p-4 mb-6">
      <h2 class="text-lg font-semibold mb-3">Scansiona un prodotto</h2>

      <!-- Contenitore scanner con dimensioni fisse per non “sbordare” -->
      <div id="reader"
           class="mx-auto rounded-lg overflow-hidden border border-gray-300 w-[240px] h-[240px]">
      </div>

      <p id="scan-result"
         class="mt-2 text-green-700 font-medium text-center"></p>

      <div class="mt-2 grid grid-cols-2 gap-2">
        <button onclick="startScanner()"
                class="bg-green-600 text-white py-2 rounded-lg shadow hover:bg-green-700">
          Avvia
        </button>
        <button onclick="stopScanner()"
                class="bg-gray-300 py-2 rounded-lg shadow hover:bg-gray-400">
          Stop
        </button>
      </div>
    </section>

    <!-- Form Prodotto -->
    <section class="bg-white shadow-md rounded-xl p-4">
      <h2 class="text-lg font-semibold mb-3">Dettagli prodotto</h2>

      <div class="space-y-3">
        <input id="barcode"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg bg-gray-100"
               placeholder="Codice scansionato" readonly />

        <input id="description"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Descrizione prodotto" />

        <input id="location"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Posizione (es. Frigo, Dispensa)" />

        <input id="quantity" type="number"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg"
               placeholder="Quantità" />

        <input id="expiry" type="date"
               class="w-full max-w-[360px] mx-auto block p-2.5 border border-gray-300 rounded-lg" />
      </div>

      <div class="grid grid-cols-3 gap-2 mt-4">
        <button onclick="saveProduct()"
                class="bg-green-600 text-white py-2 rounded-lg shadow hover:bg-green-700">
          Salva
        </button>
        <button onclick="loadProduct()"
                class="bg-blue-600 text-white py-2 rounded-lg shadow hover:bg-blue-700">
          Cerca
        </button>
        <button onclick="updateProduct()"
                class="bg-yellow-500 text-white py-2 rounded-lg shadow hover:bg-yellow-600">
          Modifica
        </button>
      </div>
    </section>

    <!-- Spazio inferiore per iPhone con notch / safe area -->
    <div class="h-6"></div>
  </div>

  <!-- Libreria scanner (funziona su iPhone/Safari) -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- App logic (ES module) -->
  <script type="module" src="app.js"></script>

  <!-- Script scanner locale (manteniamo qui per semplicità) -->
  <script>
    let qr;
    async function startScanner() {
      try {
        // Dimensione coerente con il box
        const config = { fps: 10, qrbox: 200 };
        qr = new Html5Qrcode("reader");
        await qr.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            document.getElementById("barcode").value = decodedText;
            document.getElementById("scan-result").innerText =
              "Scansionato: " + decodedText;
            stopScanner();
          }
        );
      } catch (e) {
        console.error(e);
        alert("Impossibile avviare la fotocamera. Controlla i permessi.");
      }
    }
    function stopScanner() {
      if (qr) {
        qr.stop().catch(() => {}).finally(() => (qr = null));
      }
    }
  </script>
  <script>
  async function getSWVersion() {
    if (!('serviceWorker' in navigator)) return;

    // Attende che il SW sia pronto
    const reg = await navigator.serviceWorker.ready.catch(() => null);
    if (!reg) return;

    // Trova un client attivo (la tab corrente)
    const [client] = await self.clients?.matchAll?.({ type: 'window', includeUncontrolled: true })
                     .catch(() => []) || [];
    // Crea un canale di risposta
    const chan = new MessageChannel();

    const versionPromise = new Promise((resolve) => {
      chan.port1.onmessage = (e) => resolve(e?.data?.version || null);
      // Fallback timeout
      setTimeout(() => resolve(null), 3000);
    });

    // Invia la richiesta al SW (worker ‘controller’, se presente)
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'GET_VERSION' }, [chan.port2]);
    } else if (reg.active) {
      reg.active.postMessage({ type: 'GET_VERSION' }, [chan.port2]);
    }

    const version = await versionPromise;
    if (version) {
      const el = document.getElementById('app-version');
      if (el) el.textContent = `v${version}`;
    }
  }

  // Prova a leggerla all’avvio e anche quando cambia il controller (update SW)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('controllerchange', () => getSWVersion());
    // Aspetta un attimo che il SW si attivi
    window.addEventListener('load', () => setTimeout(getSWVersion, 300));
  }
</script>
</body>
</html>
